; supervisord.worker.conf — celery-only role (currently unused)
; Runs only the Celery ingestion worker (+ a trivial health endpoint, useful
; if the host it runs on expects something listening on a port). Not
; currently deployed anywhere — HF's free tier only allows one non-static
; Space per account, so there's nowhere free to run this separately right
; now. Kept dormant for SPACE_ROLE=worker in case a genuinely free second
; host (e.g. a separate VM) becomes available later — see entrypoint.sh.

[supervisord]
nodaemon=true
logfile=/tmp/supervisord.log
pidfile=/tmp/supervisord.pid

[program:healthcheck]
command=python -m app.worker.healthcheck
directory=/code
autostart=true
autorestart=true
startretries=3
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:celery]
command=celery -A app.worker.celery_app worker --loglevel=info --concurrency=1
directory=/code
autostart=true
autorestart=true
startretries=3
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
